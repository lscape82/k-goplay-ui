<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>지도 보기 | 광고플레이 DOOH</title>
    <meta name="description" content="서울 주요 상권의 DOOH 전광판 매체를 지도형 화면에서 비교하고 탐색합니다.">
    <link rel="stylesheet" href="assets/css/styles.css?v=map-mobile-search-curation-20260629">
  </head>
  <body>
    <a class="skip-link" href="#main">본문 바로가기</a>
    <header class="map-global-header">
      <a class="map-global-brand" href="media.html" aria-label="광고플레이 홈">
        <span class="brand-mark">AD</span>
        <strong>광고플레이</strong>
      </a>
      <nav class="map-global-nav" aria-label="지도 메뉴">
        <a href="media.html">주요매체</a>
        <button type="button" class="is-active" id="mapCurationToggle" aria-expanded="true" aria-controls="mapCurationPanel">테마별 맞춤광고</button>
        <a class="map-nav-media-link is-youtube" href="https://www.youtube.com/channel/UCxXNbNumZkcpjIGzUaOnfnQ" target="_blank" rel="noopener">광고집행사례<span class="map-nav-icon" aria-hidden="true"></span></a>
        <a class="map-nav-media-link is-blog" href="guides.html">광고 인사이트<span class="map-nav-icon" aria-hidden="true"></span></a>
        <button type="button" class="map-filter-entry map-header-filter" id="mapRegionToggle" aria-expanded="false" aria-controls="mapRegionPanel">지역검색</button>
        <button type="button" class="map-filter-entry map-header-filter" id="mapCostFilterToggle" aria-expanded="false" aria-controls="mapCostFilterPanel">비용·기간 검색</button>
      </nav>
      <div class="map-global-actions">
        <a href="about.html">회사소개</a>
        <a href="login.html">로그인</a>
        <a class="join" href="join.html">회원가입</a>
      </div>
    </header>
    <main id="main">
      <section class="map-workspace-page" id="media-map">
        <div class="map-category-strip">
          <form class="map-global-search map-category-search" role="search">
            <label for="mapGlobalSearch" class="sr-only">매체 검색</label>
            <input id="mapGlobalSearch" type="search" placeholder="지역, 매체명 검색">
            <button type="submit" aria-label="검색">⌕</button>
          </form>
          <div class="map-category-list" id="mapCategoryBar" aria-label="매체 유형"></div>
        </div>
        <div class="map-workspace">
          <aside class="map-sidebar" aria-label="지도 매체 목록과 상세 정보">
            <section class="map-list-view" id="mapListView">
              <div class="map-list-head">
                <p id="mapResultSummary" aria-live="polite">지도 표시 지역에 <strong id="mapResultCount">0개</strong>의 전광판 광고가 있습니다.</p>
              </div>
              <div id="mapMediaList" class="map-sidebar-list"></div>
            </section>
            <article class="map-detail-view" id="mapDetailView" aria-live="polite" tabindex="-1" hidden></article>
          </aside>
          <section class="map-canvas-shell" aria-label="매체 위치 지도">
            <div class="map-stage" id="mapStage"></div>
            <section class="map-cost-filter-panel" id="mapCostFilterPanel" aria-label="비용 및 기간 검색" hidden>
              <div class="map-cost-filter-head">
                <h2>원하는 비용 및 기간으로 검색하세요</h2>
                <button type="button" id="mapCostFilterClose" aria-label="비용 기간 검색 닫기">×</button>
              </div>
              <div class="map-cost-filter-active" aria-live="polite">
                <span>현재 적용된 조건</span>
                <b id="mapBudgetActive">비용 전체</b>
                <b id="mapPeriodActive">기간 전체</b>
              </div>
              <div class="map-cost-filter-grid">
                <fieldset>
                  <legend>비용</legend>
                  <button type="button" class="is-active" data-budget-filter="all">비용 전체</button>
                  <button type="button" data-budget-filter="under100">100만원 미만</button>
                  <button type="button" data-budget-filter="100-300">100 - 300만원 미만</button>
                  <button type="button" data-budget-filter="300-500">300 - 500만원 미만</button>
                  <button type="button" data-budget-filter="500-1000">500 - 1,000만원 미만</button>
                  <button type="button" data-budget-filter="1000-1500">1,000 - 1,500만원 미만</button>
                  <button type="button" data-budget-filter="1500plus">1,500만원 이상</button>
                </fieldset>
                <fieldset>
                  <legend>기간</legend>
                  <button type="button" class="is-active" data-period-filter="all">기간 전체</button>
                  <button type="button" data-period-filter="1">1일</button>
                  <button type="button" data-period-filter="3">3일</button>
                  <button type="button" data-period-filter="7">7일</button>
                  <button type="button" data-period-filter="15">15일</button>
                  <button type="button" data-period-filter="30">1개월 이상</button>
                </fieldset>
              </div>
              <button type="button" class="map-cost-filter-apply" id="mapCostFilterApply">선택한 조건 적용</button>
            </section>
            <section class="map-region-panel" id="mapRegionPanel" aria-label="지역 검색" hidden>
              <div class="map-region-head">
                <h2>지역검색</h2>
                <button type="button" id="mapRegionClose" aria-label="지역 검색 닫기">×</button>
              </div>
              <div class="map-region-group">
                <p>전국/수도권</p>
                <div class="map-region-grid is-two">
                  <button type="button" data-region-target="nationwide">전국</button>
                  <button type="button" data-region-target="capital">수도권</button>
                </div>
              </div>
              <div class="map-region-group">
                <p>서울시</p>
                <button type="button" class="map-region-wide" data-region-target="seoul">서울시(전체)</button>
                <div class="map-region-grid">
                  <button type="button" data-region-target="gangbuk">강북</button>
                  <button type="button" data-region-target="gangnam">강남</button>
                  <button type="button" data-region-target="gangdong">강동</button>
                  <button type="button" data-region-target="gangseo">강서</button>
                </div>
              </div>
              <div class="map-region-group">
                <p>광역시도</p>
                <div class="map-region-grid">
                  <button type="button" data-region-target="sejong">세종시</button>
                  <button type="button" data-region-target="daejeon">대전시</button>
                  <button type="button" data-region-target="gwangju">광주시</button>
                  <button type="button" data-region-target="daegu">대구시</button>
                  <button type="button" data-region-target="busan">부산시</button>
                  <button type="button" data-region-target="ulsan">울산시</button>
                  <button type="button" data-region-target="changwon">창원시</button>
                  <button type="button" data-region-target="jeju">제주도</button>
                </div>
              </div>
            </section>
            <article class="map-curation-panel" id="mapCurationPanel" aria-label="테마별 맞춤광고 추천">
              <div class="map-curation-copy">
                <div class="map-curation-title-row">
                  <div>
                    <h2>NEW·추천 큐레이션</h2>
                  </div>
                  <button type="button" class="map-curation-close" id="mapCurationClose" aria-label="추천 패널 닫기">×</button>
                </div>
                <div class="map-curation-list" id="mapCurationList" aria-label="추천 매체 및 집행 사례"></div>
                <div class="map-curation-quick-actions">
                  <a class="map-curation-live" id="mapCurationLive" href="estimate.html?intent=live-talk">실시간 상담</a>
                  <a class="map-curation-download" id="mapCurationDownload" href="assets/downloads/goplay-media-introduction.html" download>소개서 다운로드</a>
                </div>
              </div>
              <div class="map-curation-media">
                <figure class="map-curation-visual">
                  <video id="mapCurationImage" src="assets/videos/large-billboard-260513.mp4" muted autoplay loop playsinline preload="metadata" aria-label="대형 전광판 현장 영상"></video>
                </figure>
              </div>
            </article>
            <div class="map-mode-toggle" aria-label="지도 보기 방식">
              <button type="button" class="is-active">지도</button>
              <button type="button">스카이뷰</button>
            </div>
            <div class="map-utility-controls" aria-label="지도 부가 기능">
              <button type="button">로드뷰</button>
              <button type="button">실시간<br>교통</button>
            </div>
            <div class="map-zoom-controls" aria-label="지도 확대 축소">
              <button type="button" aria-label="지도 확대">+</button>
              <button type="button" aria-label="지도 축소">−</button>
            </div>
            <div class="map-bus-stop-legend" id="mapBusStopLegend" aria-label="버스 정류장 광고 표시 범례" hidden>
              <span><i class="bus-stop-pin is-digital"><span class="bus-stop-pin-core"><span class="bus-stop-pin-window"></span><span class="bus-stop-pin-body"></span><span class="bus-stop-pin-wheel is-left"></span><span class="bus-stop-pin-wheel is-right"></span></span></i>디지털</span>
              <span><i class="bus-stop-pin is-light"><span class="bus-stop-pin-core"><span class="bus-stop-pin-window"></span><span class="bus-stop-pin-body"></span><span class="bus-stop-pin-wheel is-left"></span><span class="bus-stop-pin-wheel is-right"></span></span></i>조명</span>
              <span><i class="bus-stop-pin is-nonlight"><span class="bus-stop-pin-core"><span class="bus-stop-pin-window"></span><span class="bus-stop-pin-body"></span><span class="bus-stop-pin-wheel is-left"></span><span class="bus-stop-pin-wheel is-right"></span></span></i>비조명</span>
            </div>
            <div class="map-contact-card" aria-label="상담 채널">
              <a href="tel:1533-1975">1533-1975</a>
              <a href="estimate.html">온라인 상담</a>
              <a class="primary" href="estimate.html">실시간 라이브 상담</a>
            </div>
            <button type="button" class="map-mobile-list-toggle" id="mapMobileListToggle" aria-expanded="false" aria-controls="mapListView">
              <svg class="map-mobile-list-toggle-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
              <span class="map-mobile-list-toggle-label" id="mapMobileListToggleLabel">목록 보기</span>
            </button>
            <a class="map-consult-fab" id="mapConsultFab" href="estimate.html?intent=live-talk" aria-label="실시간 상담">
              <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false"><path d="M4 4h16a1 1 0 0 1 1 1v10a1 1 0 0 1-1 1H9.5L5 20.5V16H4a1 1 0 0 1-1-1V5a1 1 0 0 1 1-1z"/></svg>
              <span class="map-consult-fab-label">상담</span>
            </a>
            <button type="button" class="map-curation-mobile-toggle" id="mapCurationMobileToggle" aria-controls="mapCurationPanel">
              <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false"><path d="M12 2l1.9 5.9H20l-4.9 3.6 1.9 5.9L12 13.8 7 17.4l1.9-5.9L4 7.9h6.1z"/></svg>
              <span>맞춤추천</span>
            </button>
          </section>
        </div>
      </section>
    </main>
    <script src="https://oapi.map.naver.com/openapi/v3/maps.js?ncpClientId=1ouo31myef"></script>
    <script src="assets/js/common.js?v=bus-stop-layer-20260619"></script>
    <script src="assets/js/map.js?v=map-mobile-search-curation-20260629"></script>
  </body>
</html>
