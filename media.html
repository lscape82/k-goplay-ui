<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>매체 찾기 | 광고플레이 DOOH</title>
    <link rel="stylesheet" href="assets/css/styles.css?v=structure-20260522">
  </head>
  <body>
    <a class="skip-link" href="#main">본문 바로가기</a>
    <header class="site-header" data-site-header></header>
    <main id="main">
      <section class="section">
        <div class="container">
          <div class="catalog-toolbar">
            <div class="catalog-tabs" role="tablist" aria-label="매체 분류">
              <button type="button" class="catalog-tab is-active" data-tab="all" role="tab" aria-selected="true">전체 <em id="tabCountAll"></em></button>
              <button type="button" class="catalog-tab" data-tab="package" role="tab" aria-selected="false">패키지 <em id="tabCountPackage"></em></button>
            </div>
            <span id="resultCount" class="result-count" aria-live="polite"></span>
            <details class="filters" open>
              <summary>필터</summary>
              <div class="filter-grid">
                <div class="field search-field">
                  <label for="searchFilter">태그 검색</label>
                  <input id="searchFilter" type="search" placeholder="검색: 코엑스, 도산대로, 신사">
                </div>
                <div class="field">
                  <label for="areaFilter">지역</label>
                  <select id="areaFilter"><option value="all">전체 지역</option></select>
                </div>
                <div class="field" id="categoryFilterWrap">
                  <label for="categoryFilter">매체 유형</label>
                  <select id="categoryFilter"><option value="all">전체 유형</option></select>
                </div>
                <div class="field">
                  <label for="budgetFilter">예산 범위</label>
                  <select id="budgetFilter">
                    <option value="all">전체 예산</option>
                    <option value="under-10m">월 1,000만원 미만</option>
                    <option value="10m-20m">월 1,000~2,000만원</option>
                    <option value="20m-50m">월 2,000~5,000만원</option>
                    <option value="50m-100m">월 5,000만~1억원</option>
                    <option value="over-100m">월 1억원 이상</option>
                    <option value="unknown">상담 필요</option>
                  </select>
                </div>
                <div class="field">
                  <label for="sortBy">정렬</label>
                  <select id="sortBy">
                    <option value="recommended">추천순</option>
                    <option value="price-asc">가격 낮은 순</option>
                    <option value="price-desc">가격 높은 순</option>
                    <option value="area">지역권별</option>
                  </select>
                </div>
              </div>
            </details>
          </div>
          <div id="activeChips" class="active-chips" aria-live="polite"></div>
          <div id="media-list" class="grid cols-3"></div>
        </div>
      </section>
    </main>
    <footer class="site-footer" data-site-footer></footer>
    <script src="assets/js/common.js?v=structure-20260522"></script>
    <script src="assets/js/media-list.js?v=structure-20260522"></script>
  </body>
</html>
