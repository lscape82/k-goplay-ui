<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>매체 찾기 | 광고플레이 DOOH</title>
    <link rel="stylesheet" href="assets/css/styles.css?v=publisher-20260521">
  </head>
  <body>
    <a class="skip-link" href="#main">본문 바로가기</a>
    <header class="site-header">
      <nav class="nav" aria-label="주요 메뉴">
        <a class="brand" href="index.html"><span class="brand-mark">AD</span><span>광고플레이</span></a>
        <div class="nav-links">
          <a data-nav href="index.html">홈</a>
          <a data-nav href="media.html">매체 찾기</a>
          <a data-nav href="areas.html">지역 보기</a>
          <a data-nav href="guides.html">가이드</a>
          <a data-nav href="estimate.html">견적 문의</a>
        </div>
      </nav>
    </header>
    <main id="main">
      <section class="section">
        <div class="container">
          <div class="catalog-toolbar">
            <div class="catalog-title">
              <strong>매체 찾기</strong>
              <span id="resultCount" class="result-count" aria-live="polite"></span>
            </div>
            <details class="filters" open>
              <summary>필터</summary>
              <div class="filter-grid">
                <div class="field search-field">
                  <label for="searchFilter">태그 검색</label>
                  <input id="searchFilter" type="search" placeholder="검색: 코엑스, 도산대로, 신사">
                </div>
                <div class="field">
                  <label for="areaFilter">지역</label>
                  <select id="areaFilter"><option value="all">전체 지역</option></select>
                </div>
                <div class="field">
                  <label for="categoryFilter">매체 유형</label>
                  <select id="categoryFilter"><option value="all">전체 유형</option></select>
                </div>
                <div class="field">
                  <label for="budgetFilter">예산 범위</label>
                  <select id="budgetFilter">
                    <option value="all">전체 예산</option>
                    <option value="under-10m">월 1,000만원 미만</option>
                    <option value="10m-20m">월 1,000~2,000만원</option>
                    <option value="20m-50m">월 2,000~5,000만원</option>
                    <option value="over-50m">월 5,000만원 초과</option>
                    <option value="unknown">상담 필요</option>
                  </select>
                </div>
                <label class="check-field" for="shortTermFilter">
                  <input id="shortTermFilter" type="checkbox">
                  단기
                </label>
              </div>
            </details>
          </div>
          <div id="media-list" class="grid cols-3"></div>
        </div>
      </section>
    </main>
    <footer class="site-footer">
      <div class="footer-inner">
        <strong>광고플레이</strong>
        <span>Tel. 1533-1975 · E-mail. info@k-goplay.com</span>
        <small>저작권자 © 광고플레이. 무단전재 및 재배포 금지.</small>
      </div>
    </footer>
    <script src="assets/js/common.js?v=publisher-20260521"></script>
    <script src="assets/js/media-list.js?v=publisher-20260521"></script>
  </body>
</html>
