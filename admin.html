<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <!-- 운영자 전용 — 검색 색인 제외 -->
    <meta name="robots" content="noindex,nofollow">
    <title>관리자 | 광고플레이</title>
    <link rel="stylesheet" href="assets/css/styles.css">
    <style>
      body{margin:0;background:#fff;font-family:var(--font-sans);color:#1c1c1c}
      :root{--shell-max:1760px;--dock-gutter:248px}
      .hd{position:sticky;top:0;z-index:30;border-bottom:1px solid #e9edf3;background:#fff}
      .hd-in{display:flex;align-items:center;gap:22px;min-height:54px;flex-wrap:wrap;box-sizing:border-box;
             width:min(var(--shell-max),calc(100% - 40px));margin:0 auto;padding-inline:var(--dock-gutter)}
      .hd-brand{display:inline-flex;align-items:center;gap:10px;text-decoration:none;flex:none}
      .hd-brand strong{font-size:18.5px;font-weight:760;letter-spacing:-0.01em;color:#0f172a}
      .hd-brand .brand-mark{width:30px;height:30px;background-size:auto 30px}
      .hd-act{margin-left:auto;display:flex;align-items:center;gap:16px}
      .hd-act a{font-size:13px;font-weight:620;color:#475467;text-decoration:none}
      .hd-act a:hover{color:#0b1b3f}
      @media(max-width:1079px){.hd-in{padding-inline:0}}
      .adm-wrap{width:min(1000px,calc(100% - 40px));margin:0 auto;padding:34px 0 90px}
      .adm-bc{font:13px/1.6 var(--font-sans);color:#8a8a8a;margin:0 0 8px}
      .adm-bc a{color:#8a8a8a;text-decoration:none}
      .adm-wrap h1{font:850 26px/1.3 var(--font-sans);margin:6px 0 6px}
      .adm-lead{font:15px/1.7 var(--font-sans);color:#5c616b;margin:0 0 12px}
      .adm-note{font:13px/1.6 var(--font-sans);color:#9aa1ad;background:#f8fafc;border:1px solid #eef1f6;
                border-radius:10px;padding:12px 14px;margin:0 0 26px}
      .adm-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:16px}
      @media(max-width:680px){.adm-grid{grid-template-columns:1fr}}
      .adm-card{display:flex;flex-direction:column;gap:8px;padding:22px;border:1px solid #e2e8f0;border-radius:18px;
                background:#fff;text-decoration:none;color:inherit;transition:border-color .15s ease,transform .15s ease}
      .adm-card:hover{border-color:#0b3a91;transform:translateY(-2px)}
      .adm-card .ic{width:44px;height:44px;border-radius:12px;background:#eaf0ff;color:#0b3a91;display:grid;place-items:center}
      .adm-card .ic svg{width:24px;height:24px}
      .adm-card h3{font:750 18px/1.4 var(--font-sans);margin:6px 0 0;color:#0f172a}
      .adm-card p{font:14px/1.6 var(--font-sans);color:#64748b;margin:0}
      .adm-card .go{margin-top:6px;font:700 13px/1 var(--font-sans);color:#0b3a91}
    </style>
  </head>
  <body>
    <header class="hd"><div class="hd-in">
      <a class="hd-brand" href="index.html" aria-label="광고플레이 홈"><span class="brand-mark">AD</span><strong>광고플레이</strong></a>
      <div class="hd-act">
        <a href="map.html">사이트로 돌아가기</a>
      </div>
    </div></header>
    <main class="adm-wrap">
      <p class="adm-bc"><a href="index.html">홈</a> › 관리자</p>
      <h1>관리자</h1>
      <p class="adm-lead">운영자 전용 도구 모음입니다. 매체 데이터와 주소 변환을 여기서 관리합니다.</p>
      <p class="adm-note">이 페이지는 운영자용이며 검색 색인에서 제외됩니다. 추후 로그인 인증 뒤로 이동할 예정입니다.</p>
      <div class="adm-grid">
        <a class="adm-card" href="media-management.html">
          <span class="ic" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="4" rx="1"/><rect x="3" y="10" width="18" height="4" rx="1"/><rect x="3" y="16" width="18" height="4" rx="1"/></svg></span>
          <h3>매체 관리</h3>
          <p>등록 매체의 정보·가격·상태를 확인하고 관리합니다.</p>
          <span class="go">열기 →</span>
        </a>
        <a class="adm-card" href="geocode.html">
          <span class="ic" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 21s7-5.6 7-11a7 7 0 1 0-14 0c0 5.4 7 11 7 11z"/><circle cx="12" cy="10" r="2.5"/></svg></span>
          <h3>주소 변환</h3>
          <p>매체 주소를 좌표(위경도)로 변환해 지도에 반영합니다.</p>
          <span class="go">열기 →</span>
        </a>
      </div>
    </main>
  </body>
</html>
